apiVersion: apps/v1
kind: Deployment
metadata:
  name: BoundedContext1216
  labels:
    app: BoundedContext1216
spec:
  replicas: 1
  selector:
    matchLabels:
      app: BoundedContext1216
  template:
    metadata:
      labels:
        app: BoundedContext1216
    spec:
      containers:
        - name: BoundedContext1216
          image: "username/BoundedContext1216:latest"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: '/actuator/health'
              port: 8080
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: '/actuator/health'
              port: 8080
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 5
            failureThreshold: 5
